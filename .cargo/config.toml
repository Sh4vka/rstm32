[build]
target = "thumbv7m-none-eabi"

[target.thumbv7m-none-eabi]
rustflags = [
    "-C", "link-arg=-Tmemory.x",
]

[alias]
build-bin = "objcopy --release -- -O binary target/thumbv7m-none-eabi/release/stm32-blink.bin"
build-d-bin = "objcopy --release -- -O binary target/thumbv7m-none-eabi/debug/stm32-blink.bin"
